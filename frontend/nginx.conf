server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend.
    # Using a variable for the upstream defers DNS resolution to request time
    # instead of nginx startup, so the container starts even if "api" is not
    # yet resolvable (common in Aspire / Docker Compose cold-start ordering).
    resolver 127.0.0.11 valid=10s ipv6=off;
    location /api/ {
        set $upstream http://api:8080;
        proxy_pass $upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback: all other paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
